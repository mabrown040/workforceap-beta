<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Updated IBM Logo: Horizontal bars with modern styling -->
  <defs>
    <linearGradient id="ibmGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F62FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0043CE;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Stylized IBM initials using modern geometric design -->
  <g id="I">
    <rect x="15" y="8" width="8" height="44" rx="2" fill="url(#ibmGradient)"/>
  </g>
  <g id="B">
    <rect x="50" y="8" width="8" height="44" rx="2" fill="url(#ibmGradient)"/>
    <path d="M 58 10 Q 72 10 72 20 Q 72 28 58 28 L 58 10" fill="url(#ibmGradient)"/>
    <path d="M 58 30 Q 72 30 72 40 Q 72 48 58 48 L 58 30" fill="url(#ibmGradient)"/>
  </g>
  <g id="M">
    <rect x="90" y="8" width="8" height="44" rx="2" fill="url(#ibmGradient)"/>
    <polygon points="98,8 108,26 118,8 126,8 126,52 118,52 118,30 108,50 98,30 98,52 90,52 90,8" fill="url(#ibmGradient)"/>
  </g>
  <!-- IBM text mark alternative (simplified modern interpretation) -->
  <text x="150" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0F62FE">IBM</text>
</svg>
