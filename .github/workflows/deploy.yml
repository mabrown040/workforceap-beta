name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest changes
        run: |
          cd /var/www/workforceap
          git pull origin master

      - name: Install all dependencies (including devDeps for build)
        run: |
          cd /var/www/workforceap
          npm ci

      - name: Build Next.js
        run: |
          cd /var/www/workforceap
          npm run build

      - name: Restart app via pm2
        run: |
          pm2 restart workforceap
          pm2 save
          echo "Deployed at $(date)"
